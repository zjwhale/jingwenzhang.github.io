<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" role="img" aria-labelledby="title desc">
  <title id="title">Hot Jupiter with outer companion</title>
  <desc id="desc">Stylized dark-background exoplanet system illustration with a hot Jupiter on an inner orbit and an outer companion.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde4"/>
      <stop offset="28%" stop-color="#ffd84a"/>
      <stop offset="60%" stop-color="#e09e00" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#1e273c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="planetBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ca5d9"/>
      <stop offset="60%" stop-color="#14628a"/>
      <stop offset="100%" stop-color="#08253a"/>
    </linearGradient>
    <linearGradient id="planetBrown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#df9960"/>
      <stop offset="55%" stop-color="#92592c"/>
      <stop offset="100%" stop-color="#402618"/>
    </linearGradient>
  </defs>
  <rect width="420" height="420" fill="#20283b"/>
  <circle cx="210" cy="210" r="95" fill="url(#glow)"/>
  <circle cx="210" cy="210" r="26" fill="#fff8c9"/>

  <ellipse cx="210" cy="210" rx="48" ry="126" transform="rotate(76 210 210)" fill="none" stroke="#f2f2f2" stroke-width="4"/>
  <ellipse cx="210" cy="210" rx="152" ry="152" fill="none" stroke="#e6ebf4" stroke-width="3"/>

  <circle cx="132" cy="210" r="28" fill="url(#planetBlue)"/>
  <rect x="130" y="235" width="4" height="42" fill="#e9edf4" opacity="0.88"/>

  <circle cx="343" cy="266" r="16" fill="url(#planetBrown)"/>

  <text x="210" y="308" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" fill="#ffffff">Hot Jupiter</text>
</svg>
